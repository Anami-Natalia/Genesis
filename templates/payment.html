<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure M-Pesa Payment</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f9d58,#0b8043);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .payment-card{

            width:100%;
            max-width:470px;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 20px 60px rgba(0,0,0,.2);

        }

        .payment-header{

            background:#0f9d58;
            color:white;
            text-align:center;
            padding:35px;

        }

        .payment-header i{

            font-size:60px;
            margin-bottom:10px;

        }

        .payment-body{

            background:white;
            padding:35px;

        }

        .form-control{

            height:55px;
            border-radius:12px;
            border:1px solid #ddd;
        }

        .form-control:focus{

            border-color:#0f9d58;
            box-shadow:0 0 0 .2rem rgba(15,157,88,.2);

        }

        .input-group-text{

            background:#0f9d58;
            color:white;
            border:none;
        }

        .btn-pay{

            height:55px;
            border-radius:12px;
            background:#0f9d58;
            color:white;
            font-size:18px;
            font-weight:600;
            transition:.3s;

        }

        .btn-pay:hover{

            background:#08753c;
            transform:translateY(-2px);

        }

        .security{

            text-align:center;
            margin-top:20px;
            color:gray;
            font-size:14px;

        }

        .badge-price{

            background:#e8f5e9;
            color:#0f9d58;
            font-size:18px;
            padding:12px;
            border-radius:12px;
            text-align:center;
            font-weight:600;

        }

    </style>

</head>
<body>

<div class="card payment-card">

    <div class="payment-header">

        <i class="bi bi-phone-fill"></i>

        <h3>Secure M-Pesa Payment</h3>

        <p class="mb-0">
            Complete your payment safely and instantly
        </p>

    </div>

    <div class="payment-body">

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    M-Pesa Phone Number
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-telephone-fill"></i>
                    </span>

                    <input
                        type="text"
                        class="form-control"
                        name="phone"
                        placeholder="254712345678"
                        required>

                </div>

            </div>

            <div class="mb-4">

                <label class="form-label fw-semibold">
                    Payment Amount
                </label>

                <div class="badge-price">

                    KES 100

                </div>

                <input
                    type="hidden"
                    name="amount"
                    value="100">

            </div>

            <button class="btn btn-pay w-100">

                <i class="bi bi-shield-lock-fill"></i>

                Pay with M-Pesa

            </button>

        </form>

        <div class="security">

            <i class="bi bi-lock-fill text-success"></i>

            Your transaction is encrypted and secured.

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
