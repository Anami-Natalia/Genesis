<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Contact</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}">
    <script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body{

            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
            padding:40px;

        }

        .main-container{

            width:100%;
            max-width:1200px;

        }

        .card-box{

            background:white;
            border-radius:20px;
            padding:50px;
            box-shadow:0 20px 60px rgba(0,0,0,.2);

        }

        .page-title{

            font-size:40px;
            font-weight:700;
            color:#1e293b;
            text-align:center;
            margin-bottom:10px;

        }

        .page-subtitle{

            text-align:center;
            color:#64748b;
            margin-bottom:40px;
            font-size:18px;

        }

        label{

            font-weight:600;
            color:#334155;
            margin-bottom:8px;

        }

        .form-control{

            height:55px;
            border-radius:12px;
            border:1px solid #dbe2ea;
            font-size:16px;
            transition:.3s;

        }

        textarea.form-control{

            height:180px;
            resize:none;

        }

        .form-control:focus{

            border-color:#2563eb;
            box-shadow:0 0 0 .2rem rgba(37,99,235,.2);

        }

        .btn-update{

            background:#2563eb;
            color:white;
            border:none;
            width:100%;
            height:60px;
            font-size:18px;
            font-weight:600;
            border-radius:12px;
            transition:.3s;

        }

        .btn-update:hover{

            background:#1d4ed8;
            transform:translateY(-2px);

        }

        .header-line{

            width:90px;
            height:5px;
            background:#2563eb;
            margin:15px auto 35px;
            border-radius:50px;

        }

        @media(max-width:768px){

            .card-box{

                padding:30px;

            }

            .page-title{

                font-size:30px;

            }

        }

    </style>

</head>

<body>

<div class="main-container">

    <div class="card-box">

        <h1 class="page-title">
            Edit Contact Information
        </h1>

        <div class="header-line"></div>

        <p class="page-subtitle">
            Update the customer contact information below and save the changes.
        </p>

        <form method="post">

            {% csrf_token %}

            <div class="row g-4">

                <div class="col-lg-6">

                    <label>Your Name</label>

                    <input
                        type="text"
                        class="form-control"
                        name="name"
                        required
                        value="{{ editappointment.name }}"
                    >

                </div>

                <div class="col-lg-6">

                    <label>Email Address</label>

                    <input
                        type="email"
                        class="form-control"
                        name="email"
                        required
                        value="{{ editappointment.email }}"
                    >

                </div>

                <div class="col-12">

                    <label>Subject</label>

                    <input
                        type="text"
                        class="form-control"
                        name="subject"
                        required
                        value="{{ editappointment.subject }}"
                    >

                </div>

                <div class="col-12">

                    <label>Message</label>

                    <textarea
                        class="form-control"
                        name="message"
                        required
                    >{{ editappointment.message }}</textarea>

                </div>

                <div class="col-12 mt-4">

                    <button class="btn-update" type="submit">

                        Update Contact Information

                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

</body>
</html>
